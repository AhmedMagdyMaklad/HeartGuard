name: heartguard_mobile
description: "HeartGuard mobile application."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  file_picker: ^11.0.2
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_svg: ^2.3.0
  go_router: ^17.2.0
  google_fonts: ^8.0.2
  http: ^1.6.0
  image_picker: ^1.2.2
  intl: ^0.20.2
  lucide_icons: ^0.257.0
  provider: ^6.1.5+1
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/HeartGuard_Logo.svg

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
